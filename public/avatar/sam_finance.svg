<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="samBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EC4B6"/>
      <stop offset="100%" stop-color="#0A9396"/>
    </linearGradient>
    <linearGradient id="samShirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2B2D42"/>
      <stop offset="100%" stop-color="#1F2133"/>
    </linearGradient>
    <clipPath id="samCircle">
      <circle cx="200" cy="200" r="160"/>
    </clipPath>
  </defs>

  <circle cx="200" cy="200" r="160" fill="url(#samBg)"/>

  <g clip-path="url(#samCircle)">
    <!-- Buste costume -->
    <path d="M 60 400 Q 60 300 140 280 L 260 280 Q 340 300 340 400 Z" fill="url(#samShirt)"/>
    <!-- Col chemise -->
    <path d="M 170 280 L 200 310 L 230 280 L 230 295 L 200 325 L 170 295 Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- Nœud papillon/cravate classique -->
    <path d="M 195 315 L 205 315 L 207 335 L 193 335 Z" fill="#2EC4B6"/>

    <!-- Cou -->
    <path d="M 182 255 Q 182 285 200 290 Q 218 285 218 255 Z" fill="#C68C5F"/>

    <!-- Visage -->
    <ellipse cx="200" cy="200" rx="52" ry="62" fill="#D9A574"/>

    <!-- Cheveux très courts, classiques -->
    <path d="M 150 185 Q 148 148 190 138 Q 230 138 252 165 Q 255 185 252 195 Q 245 172 220 170 Q 200 172 180 172 Q 160 175 150 185 Z" fill="#1A1208"/>

    <!-- Lunettes fines -->
    <circle cx="180" cy="200" r="14" fill="none" stroke="#2B2D42" stroke-width="2.5"/>
    <circle cx="220" cy="200" r="14" fill="none" stroke="#2B2D42" stroke-width="2.5"/>
    <line x1="194" y1="200" x2="206" y2="200" stroke="#2B2D42" stroke-width="2"/>
    <line x1="166" y1="200" x2="158" y2="197" stroke="#2B2D42" stroke-width="2"/>
    <line x1="234" y1="200" x2="242" y2="197" stroke="#2B2D42" stroke-width="2"/>

    <!-- Sourcils -->
    <path d="M 170 184 Q 180 181 190 184" stroke="#1A1208" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 210 184 Q 220 181 230 184" stroke="#1A1208" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Yeux derrière lunettes -->
    <circle cx="180" cy="200" r="3" fill="#2B1810"/>
    <circle cx="220" cy="200" r="3" fill="#2B1810"/>

    <!-- Nez -->
    <path d="M 200 214 Q 197 226 200 232" stroke="#A67244" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Bouche (sérieuse, pro) -->
    <path d="M 188 244 Q 200 248 212 244" stroke="#6B4226" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Badge icône finance (euro/pièce) -->
  <g transform="translate(300, 300)">
    <circle cx="0" cy="0" r="34" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="26" fill="#2EC4B6"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#0A9396" stroke-width="1.5" stroke-dasharray="2,2"/>
    <!-- Symbole euro -->
    <path d="M 8 -10 Q -6 -12 -10 0 Q -6 12 8 10 M -14 -3 L -2 -3 M -14 3 L -2 3" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>

  <g transform="translate(200, 382)">
    <text text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2B2D42" letter-spacing="2">SAM</text>
  </g>
</svg>
