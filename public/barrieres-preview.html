<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Barrieres a l'entree — Preview (FounderAI)</title>
<meta name="viewport" content="width=1100"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  :root{--paper:#FBF8F0;--card:#FFF;--ink:#0F0E0B;--muted:#6C6760;--line:#E0D9C7;--orange:#FF6A1F;--magenta:#E8358E;--violet:#6E4BE8;--teal:#0DB4A0;--yellow:#FFD12A}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#E5E2D8;font-family:'Geist',sans-serif;color:var(--ink)}
  .toolbar{position:fixed;top:20px;right:20px;z-index:100;display:flex;gap:8px}
  .toolbar button{padding:12px 24px;background:var(--ink);color:var(--paper);border:none;border-radius:999px;font-size:14px;cursor:pointer}
  .toolbar .back{background:transparent;border:1px solid #D9D3C4;color:var(--ink)}
  .page{width:210mm;min-height:297mm;margin:40px auto;padding:14mm;background:var(--paper);box-shadow:0 4px 40px rgba(0,0,0,.08);position:relative}
  .header{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .header .logo{width:24px;height:24px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Anton',sans-serif;font-size:14px}
  .header .name{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .header .name strong{color:var(--ink);font-weight:700}
  .header .date{margin-left:auto;font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted)}
  h1.title{font-family:'Anton',sans-serif;font-size:38px;text-transform:uppercase;line-height:.88;letter-spacing:-.012em;margin-bottom:24px}
  .sec{margin-bottom:20px;padding:16px 18px;background:var(--card);border-radius:8px;border-left:4px solid var(--orange)}
  .sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .sec-hdr .num{width:20px;height:20px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-family:'Geist Mono',monospace;font-size:9px;font-weight:700}
  .sec-hdr .lbl{font-family:'Anton',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.02em}
  .sec .content{font-size:11px;line-height:1.7;white-space:pre-wrap;margin-bottom:10px}
  .score-row{display:flex;gap:20px;font-family:'Geist Mono',monospace;font-size:10px}
  .score-row .score-label{color:var(--muted);text-transform:uppercase;font-size:8px;letter-spacing:.12em;margin-bottom:2px}
  .dots{display:flex;gap:3px}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot-empty{background:var(--line)}
  .synthesis{margin-top:24px;padding:18px 20px;background:var(--card);border:2px solid var(--ink);border-radius:8px}
  .synthesis .syn-title{font-family:'Anton',sans-serif;font-size:14px;text-transform:uppercase;margin-bottom:8px}
  .synthesis .syn-text{font-size:13px;line-height:1.7;font-weight:500}
  .footer{margin-top:30px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  @media print{.toolbar{display:none!important}body{background:#fff}.page{box-shadow:none;margin:0;width:100%}@page{size:A4 portrait;margin:0}.page{print-color-adjust:exact;-webkit-print-color-adjust:exact}}
</style>
</head>
<body>
<div class="toolbar">
  <button class="back" onclick="window.close()||history.back()">← Retour</button>
  <button onclick="window.print()">Exporter en PDF ↓</button>
</div>
<div class="page" id="root"></div>
<script>
const raw=sessionStorage.getItem('founderai_barrieres');
let d={};if(raw){try{d=JSON.parse(raw)}catch(e){}}
const sections=d.sections||{};
const scores=d.scores||{};
const startupName=d.startupName||'Startup';
const today=new Date().toLocaleDateString('fr-FR');
const esc=s=>(s||'').replace(/</g,'&lt;').replace(/\n/g,'<br>');

const SECS=[
  {key:'ip',label:'Propriete intellectuelle',color:'#FF6A1F',num:'01'},
  {key:'network_effects',label:'Effets reseau',color:'#E8358E',num:'02'},
  {key:'switching_costs',label:'Switching costs',color:'#6E4BE8',num:'03'},
  {key:'data_advantage',label:'Avantage de donnees',color:'#0DB4A0',num:'04'},
  {key:'economies_scale',label:'Economies d\'echelle',color:'#FFD12A',num:'05'},
];

let html='';

// Header
html+=`<div class="header"><div class="logo">f</div><div class="name"><strong>${startupName.toUpperCase()}</strong> &middot; Barrieres a l'entree</div><div class="date">${today}</div></div>`;
html+=`<h1 class="title">BARRIERES A L'ENTREE</h1>`;

// Sections
SECS.forEach(s=>{
  const content=sections[s.key];
  const sc=scores[s.key]||{current:0,target18m:0};
  if(!content&&!sc.current) return;

  const dotsFn=(val,color,dashed)=>Array.from({length:5},(_,i)=>
    `<div class="dot" style="background:${i<val?color:'var(--line)'};${dashed?'border:1.5px dashed '+color+';background:'+(i<val?color+'cc':'transparent'):''}"></div>`
  ).join('');

  html+=`<div class="sec" style="border-left-color:${s.color}">
    <div class="sec-hdr"><span class="num" style="background:${s.color}">${s.num}</span><span class="lbl">${s.label}</span></div>
    ${content?`<div class="content">${esc(content)}</div>`:''}
    <div class="score-row">
      <div><div class="score-label">Aujourd'hui</div><div class="dots">${dotsFn(sc.current,s.color,false)}</div></div>
      <div><div class="score-label">18 mois</div><div class="dots">${dotsFn(sc.target18m,s.color,true)}</div></div>
    </div>
  </div>`;
});

// Synthesis
if(d.synthesis){
  html+=`<div class="synthesis"><div class="syn-title">Pourquoi on est difficile a copier</div><div class="syn-text">${esc(d.synthesis)}</div></div>`;
}

// Footer
html+=`<div class="footer"><span>${startupName.toUpperCase()} &middot; Barrieres a l'entree &middot; ${today}</span><span>Confidentiel</span></div>`;
document.getElementById('root').innerHTML=html;
</script>
</body>
</html>
