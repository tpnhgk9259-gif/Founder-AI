// ── Helper : lire une valeur du formulaire avec fallback ──────────────
const V = (key, fallback = '') => (window.FORM_VALUES && window.FORM_VALUES[key]) || fallback;

// Helper : decouper un titre long en lignes
function splitTitle(text, maxChars = 35) {
  if (!text) return [''];
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    if (current && (current + ' ' + word).length > maxChars) {
      lines.push(current);
      current = word;
    } else {
      current = current ? current + ' ' + word : word;
    }
  }
  if (current) lines.push(current);
  return lines.length > 0 ? lines : [''];
}

// Helper : taille auto selon longueur du texte
function autoSize(text, baseSize = 40) {
  if (!text) return baseSize;
  const len = text.length;
  if (len < 30) return baseSize;
  if (len < 50) return Math.round(baseSize * 0.9);
  if (len < 80) return Math.round(baseSize * 0.8);
  if (len < 120) return Math.round(baseSize * 0.7);
  return Math.round(baseSize * 0.6);
}

  const chartData = [1,2,3,4,5,6,7,8].map(i => ({
    month: V(`chart_m${i}`, ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8'][i-1] || ''),

  const max = Math.max(...chartData.map(d => d.value), 1);
  const chartLabel = V('chart_label', 'ARR (k&#8364;)');

  return (
    <div className="pdf-sheet">
      <PDFHeader startup={V('startupName') || s.name} logo={V('startup_logo')} kind="Pitch Deck" page={n} total={TOTAL}/>
      <Eyebrow x={14} y={22} accent={PDF_COLORS.lime}>06 &#8212; Traction</Eyebrow>

        <div style={{ width: 140 * MM, height: 72 * MM, background: PDF_COLORS.card, border: `1px solid ${PDF_COLORS.line}`, borderRadius: 6, padding: 4 * MM, position: 'relative' }}>
          <div style={{ fontFamily: 'Geist Mono', fontSize: 8, letterSpacing: '0.16em', textTransform: 'uppercase', color: PDF_COLORS.muted, fontWeight: 600 }}>{chartLabel}</div>
          <svg viewBox="0 0 400 180" style={{ width: '100%', height: '82%', marginTop: 2 * MM, display: 'block' }}>

            ))}
            {chartData.map((d, i) => {
              const bw = Math.min(40, Math.max(25, 300 / chartData.length));
              const gap = (360 - chartData.length * bw) / Math.max(chartData.length - 1, 1);
              const x = 40 + i * (bw + gap);
              const h = (d.value / max) * 140;
              const y = 160 - h;
              return (
                <g key={i}>
                  <rect x={x} y={y} width={bw} height={h} fill={i === chartData.length - 1 ? PDF_COLORS.orange : PDF_COLORS.ink}/>
                  <text x={x + bw / 2} y={175} fontFamily="Geist Mono" fontSize="8" fill={PDF_COLORS.muted} textAnchor="middle" letterSpacing="0.1em">{d.month}</text>
                  {d.value > 0 && <text x={x + bw / 2} y={y - 4} fontFamily="Anton" fontSize="11" fill={PDF_COLORS.ink} textAnchor="middle">{d.value}</text>}
                </g>

            <div key={label} style={{
              padding: `${2 * MM}px ${3 * MM}px`, background: PDF_COLORS.card,
              border: `1px solid ${PDF_COLORS.line}`, borderRadius: 6,

const SlideSAFunds = ({ s, n }) => {
  // Parse fund percentages for donut
  const f1 = parseInt(V('fund1_pct', '40').replace(/\D/g, '')) || 40;
  const f2 = parseInt(V('fund2_pct', '25').replace(/\D/g, '')) || 25;
  const f3 = parseInt(V('fund3_pct', '20').replace(/\D/g, '')) || 20;
  const f4 = parseInt(V('fund4_pct', '15').replace(/\D/g, '')) || 15;
  const total = f1 + f2 + f3 + f4;
  const p1 = (f1 / total * 100);

  ].filter(Boolean),
} : LUMEN_SA;

window.FORM_VALUES = v;

if (hasData && v.startupName) {
  document.getElementById('hdr-title').textContent = 'PITCH DECK SERIE A — ' + v.startupName.toUpperCase();
}

const renderDeck = () => {
  ReactDOM.createRoot(document.getElementById('pitch-root')).render(
    <PitchDeckSA s={startupData}/>
  );
};

setTimeout(async () => {
  if (v.brand_color) {
    window.applyBrandColor(v.brand_color);
  } else if (v.adapt_colors === 'true' && v.startup_logo) {
    await window.applyLogoColors(v.startup_logo);
  }
  renderDeck();
}, 50);
</script>

</body>
</html>
